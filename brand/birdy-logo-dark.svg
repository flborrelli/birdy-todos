<svg width="360" height="120" viewBox="0 0 360 120" xmlns="http://www.w3.org/2000/svg">
  <title>Birdy — logo dark</title>

  <defs>
    <g id="bird">
      <rect width="40" height="40" rx="9" fill="#1A1A1A"/>
      <rect x="8.5" y="17.5" width="18.75" height="12.5" rx="3.75" fill="white" transform="rotate(-8, 18, 24)"/>
      <circle cx="23.75" cy="12.5" r="5.625" fill="white"/>
      <polygon points="8.5,21.25 3.75,27.5 11.25,27.5" fill="white"/>
      <polygon points="11.25,18.75 23.75,16.25 22.5,21.25 11.25,22.5" fill="white" opacity="0.55"/>
      <polygon points="28.75,11.875 34.375,13.125 28.75,15" fill="white"/>
      <circle cx="25" cy="11.875" r="1.75" fill="#1A1A1A"/>
      <circle cx="25.625" cy="11.25" r="0.5625" fill="white"/>
    </g>
  </defs>

  <!-- fundo -->
  <rect width="360" height="120" rx="14" fill="#1A1A1A"/>

  <!-- ícone -->
  <g transform="translate(36, 18)">
    <use href="#bird"/>
  </g>

  <!-- wordmark -->
  <text x="88" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="600" fill="white" letter-spacing="-1" dominant-baseline="baseline">Birdy</text>

  <!-- separador -->
  <line x1="36" y1="70" x2="324" y2="70" stroke="#333333" stroke-width="0.5"/>

  <!-- tagline -->
  <text x="180" y="97" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="#888780" letter-spacing="1.2">Anote. Organize. Voe mais leve.</text>
</svg>
