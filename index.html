<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Birdy · Tarefas</title>
  <meta name="description" content="Gerencie prazos judiciais, contratos e tarefas do escritório com agilidade.">
  <!-- Open Graph / WhatsApp / Telegram -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://birdy-tarefas.web.app/">
  <meta property="og:title" content="Birdy · Tarefas">
  <meta property="og:description" content="Gerencie prazos judiciais, contratos e tarefas do escritório com agilidade.">
  <meta property="og:image" content="https://birdy-tarefas.web.app/brand/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Birdy · Tarefas">
  <meta name="twitter:description" content="Gerencie prazos judiciais, contratos e tarefas do escritório com agilidade.">
  <meta name="twitter:image" content="https://birdy-tarefas.web.app/brand/og-image.png">
  <link rel="icon" type="image/svg+xml" href="brand/birdy-icon-64.svg">
  <link rel="stylesheet" href="brand/birdy-tokens.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <script>(function(){var t=localStorage.getItem('birdy-theme');if(t&&t!=='auto')document.documentElement.setAttribute('data-theme',t)})();</script>
</head>
<body>

<!-- Tela de login -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg class="login-logo-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120">
        <rect width="360" height="120" rx="14" fill="#F1EFE8"/>
        <defs><g id="bl-bird">
          <rect width="40" height="40" rx="9" fill="#F1EFE8"/>
          <rect x="8.5" y="17.5" width="18.75" height="12.5" rx="3.75" fill="#1A1A1A" transform="rotate(-8,18,24)"/>
          <circle cx="23.75" cy="12.5" r="5.625" fill="#1A1A1A"/>
          <polygon points="8.5,21.25 3.75,27.5 11.25,27.5" fill="#1A1A1A"/>
          <polygon points="11.25,18.75 23.75,16.25 22.5,21.25 11.25,22.5" fill="#1A1A1A" opacity="0.45"/>
          <polygon points="28.75,11.875 34.375,13.125 28.75,15" fill="#1A1A1A"/>
          <circle cx="25" cy="11.875" r="1.75" fill="#F1EFE8"/>
          <circle cx="25.625" cy="11.25" r="0.5625" fill="#1A1A1A"/>
        </g></defs>
        <g transform="translate(36,18)"><use href="#bl-bird"/></g>
        <text x="88" y="52" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="36" font-weight="600" fill="#1A1A1A" letter-spacing="-1" dominant-baseline="baseline">Birdy</text>
        <line x1="36" y1="70" x2="324" y2="70" stroke="#D3D1C7" stroke-width="0.5"/>
        <text x="180" y="97" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#888780" letter-spacing="1.2">Anote. Organize. Voe mais leve.</text>
      </svg>
      <svg class="login-logo-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120">
        <rect width="360" height="120" rx="14" fill="#1A1A1A"/>
        <defs><g id="bd-bird">
          <rect width="40" height="40" rx="9" fill="#1A1A1A"/>
          <rect x="8.5" y="17.5" width="18.75" height="12.5" rx="3.75" fill="white" transform="rotate(-8,18,24)"/>
          <circle cx="23.75" cy="12.5" r="5.625" fill="white"/>
          <polygon points="8.5,21.25 3.75,27.5 11.25,27.5" fill="white"/>
          <polygon points="11.25,18.75 23.75,16.25 22.5,21.25 11.25,22.5" fill="white" opacity="0.55"/>
          <polygon points="28.75,11.875 34.375,13.125 28.75,15" fill="white"/>
          <circle cx="25" cy="11.875" r="1.75" fill="#1A1A1A"/>
          <circle cx="25.625" cy="11.25" r="0.5625" fill="white"/>
        </g></defs>
        <g transform="translate(36,18)"><use href="#bd-bird"/></g>
        <text x="88" y="52" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="36" font-weight="600" fill="white" letter-spacing="-1" dominant-baseline="baseline">Birdy</text>
        <line x1="36" y1="70" x2="324" y2="70" stroke="#333333" stroke-width="0.5"/>
        <text x="180" y="97" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#888780" letter-spacing="1.2">Anote. Organize. Voe mais leve.</text>
      </svg>
    </div>
    <div class="login-sub">Entre com sua conta Google para acessar suas tarefas de qualquer dispositivo.</div>
    <button class="btn-google" id="btn-google-login">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/>
      </svg>
      Entrar com Google
    </button>
  </div>
</div>

<!-- App principal -->
<div class="app" id="main-app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="header-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" height="26" aria-label="Birdy" style="flex-shrink:0;overflow:visible">
            <defs><g id="wm-bird">
              <rect width="40" height="40" rx="9" fill="#1A1A1A"/>
              <rect x="8.5" y="17.5" width="18.75" height="12.5" rx="3.75" fill="white" transform="rotate(-8,18,24)"/>
              <circle cx="23.75" cy="12.5" r="5.625" fill="white"/>
              <polygon points="8.5,21.25 3.75,27.5 11.25,27.5" fill="white"/>
              <polygon points="11.25,18.75 23.75,16.25 22.5,21.25 11.25,22.5" fill="white" opacity="0.55"/>
              <polygon points="28.75,11.875 34.375,13.125 28.75,15" fill="white"/>
              <circle cx="25" cy="11.875" r="1.75" fill="#1A1A1A"/>
              <circle cx="25.625" cy="11.25" r="0.5625" fill="white"/>
            </g></defs>
            <g transform="translate(0,6)"><use href="#wm-bird"/></g>
            <text x="52" y="40" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="36" font-weight="600" fill="currentColor" letter-spacing="-1" dominant-baseline="baseline">Birdy</text>
          </svg>
        </div>
        <div class="header-date" id="date-label"></div>
      </div>
      <div class="user-area">
        <img class="user-avatar" id="user-avatar" src="" alt="">
        <span class="user-name" id="user-name"></span>
        <button class="btn-theme" id="btn-theme" onclick="cycleTheme()" title="Alternar tema" aria-label="Alternar tema">
          <i class="ti ti-brightness-auto" id="theme-icon"></i>
        </button>
        <button class="btn-logout" onclick="doLogout()">Sair</button>
      </div>
    </div>
    <button class="btn-new sidebar-new" onclick="openModal()"><i class="ti ti-plus" aria-hidden="true"></i>Nova tarefa</button>
    <div class="sidebar-divider"></div>
    <div class="stats" id="stats"></div>
    <div class="sidebar-divider"></div>
    <div class="tabs">
      <button class="tab active" onclick="setView('pending')" id="tab-pending"><i class="ti ti-clock" aria-hidden="true"></i><span>Pendentes</span></button>
      <button class="tab" onclick="setView('today')" id="tab-today"><i class="ti ti-alert-triangle" aria-hidden="true"></i><span>Urgentes</span></button>
      <button class="tab" onclick="setView('done')" id="tab-done"><i class="ti ti-check" aria-hidden="true"></i><span>Concluídas</span></button>
      <button class="tab" onclick="setView('calendar')" id="tab-calendar"><i class="ti ti-calendar-month" aria-hidden="true"></i><span>Calendário</span></button>
    </div>
  </aside>
  <div class="content">
    <div class="sync-bar">
      <div class="sync-dot syncing" id="sync-dot"></div>
      <span id="sync-label">Conectando…</span>
    </div>
    <div class="search-wrap">
      <i class="ti ti-search search-icon" aria-hidden="true"></i>
      <input type="text" class="search-input" id="search-input" placeholder="Buscar tarefas…" oninput="setSearch(this.value)" autocomplete="off">
      <button class="search-clear" id="search-clear" onclick="clearSearch()" aria-label="Limpar busca" style="display:none"><i class="ti ti-x"></i></button>
    </div>
    <div class="filters" id="filters"></div>
    <div class="sort-row">
      <span class="sort-label"><i class="ti ti-arrows-sort" aria-hidden="true" style="font-size:13px"></i>Ordenar por</span>
      <select onchange="sortBy=this.value;render()">
        <option value="prio">Prioridade</option>
        <option value="date">Data</option>
        <option value="cat">Categoria</option>
        <option value="added">Mais recentes</option>
      </select>
    </div>
    <div id="list"></div>
  </div>
</div>

<button class="fab" onclick="openModal()" aria-label="Nova tarefa" id="fab">
  <i class="ti ti-plus" aria-hidden="true"></i>
</button>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title-text" id="modal-title-el">Nova tarefa</span>
      <button class="icon-btn" onclick="closeModal()" aria-label="Fechar"><i class="ti ti-x"></i></button>
    </div>
    <input type="text" id="m-title" placeholder="Descrição da tarefa…" style="width:100%;margin-bottom:8px" onkeydown="if(event.key==='Enter')saveModal()">
    <div class="mfr">
      <select id="m-cat" onchange="togglePrazoFields()">
        <option value="prazo">⚖️ Prazo judicial</option>
        <option value="contrato">📄 Contrato</option>
        <option value="cartorio">🏛️ Cartório</option>
        <option value="societario">🏢 Societário</option>
        <option value="ato">📋 Ato Societário</option>
        <option value="procuracao">✍️ Procuração</option>
        <option value="email">✉️ E-mail</option>
        <option value="reuniao">🤝 Reunião</option>
        <option value="outro">📌 Outro</option>
      </select>
      <select id="m-prio">
        <option value="alta">🔴 Alta</option>
        <option value="media">🟡 Média</option>
        <option value="baixa">⚪ Baixa</option>
      </select>
      <input type="date" id="m-date">
    </div>
    <div class="prazo-fields" id="prazo-fields" style="display:none">
      <div class="prazo-fields-label"><i class="ti ti-scale" style="font-size:12px"></i>Dados do processo <span style="font-weight:400;text-transform:none;letter-spacing:0;opacity:.65;margin-left:3px">(opcional)</span></div>
      <input type="text" id="m-processo" placeholder="Nº do processo (ex: 1023456-78.2024.8.26.0100)">
      <div class="prazo-row">
        <input type="text" id="m-autor" placeholder="Autor">
        <input type="text" id="m-reu" placeholder="Réu">
      </div>
    </div>
    <textarea id="m-note" placeholder="Observações…"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-add" onclick="saveModal()" id="modal-save-btn">
        <div class="spinner"></div>
        <span class="btn-label">Adicionar</span>
      </button>
    </div>
  </div>
</div>

<!-- Modal de detalhes da tarefa -->
<div class="modal-overlay" id="detail-overlay" onclick="handleDetailOverlayClick(event)" role="dialog" aria-modal="true">
  <div class="modal detail-modal">
    <div class="modal-header">
      <span class="modal-title-text" id="detail-title"></span>
      <div style="display:flex;gap:4px">
        <button class="icon-btn" id="detail-edit-btn" aria-label="Editar tarefa"><i class="ti ti-edit"></i></button>
        <button class="icon-btn" onclick="closeDetail()" aria-label="Fechar"><i class="ti ti-x"></i></button>
      </div>
    </div>
    <div class="detail-meta" id="detail-meta"></div>
    <div class="detail-note-text" id="detail-note-text"></div>
    <div class="detail-notes-header">
      <span class="section-label" style="margin:0">Post-its</span>
      <button class="btn-add-note" onclick="toggleNoteForm()"><i class="ti ti-plus"></i> Novo</button>
    </div>
    <div class="note-form" id="note-form" style="display:none">
      <textarea id="note-text-input" placeholder="Comentário curto…" maxlength="150"></textarea>
      <div class="note-colors" id="note-colors"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
        <button class="btn-cancel" onclick="toggleNoteForm()">Cancelar</button>
        <button class="btn-add" onclick="saveNote()"><span class="btn-label">Adicionar</span></button>
      </div>
    </div>
    <div class="postit-board" id="postit-board"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
